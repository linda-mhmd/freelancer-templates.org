         L180,190 Q140,180 120,160 Z" fill="#f3f4f6" stroke="#d1d5db" stroke-width="0.5"/>

<!-- South America -->
<path d="M280,280 Q300,260 320,270 L340,320 Q350,360 330,400 L300,420 Q270,400 280,350 Z" 
      fill="#f3f4f6" stroke="#d1d5db" stroke-width="0.5"/>

<!-- Europe -->
